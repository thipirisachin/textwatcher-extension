<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextWatcher</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="header__brand">
      <svg class="header__logo" width="28" height="28" viewBox="80 70 390 390" xmlns="http://www.w3.org/2000/svg" aria-label="TextWatcher">
        <rect x="120" y="100" width="260" height="300" rx="24" fill="#3388ff"/>
        <rect x="120" y="100" width="260" height="80" rx="24" fill="rgba(255,255,255,0.10)"/>
        <rect x="158" y="170" width="182" height="18" rx="9" fill="rgba(255,255,255,0.80)"/>
        <rect x="158" y="212" width="182" height="18" rx="9" fill="rgba(255,255,255,0.80)"/>
        <rect x="158" y="254" width="120" height="18" rx="9" fill="rgba(255,255,255,0.50)"/>
        <circle cx="360" cy="360" r="70" fill="none" stroke="#93ddff" stroke-width="14" opacity="0.35"/>
        <circle cx="360" cy="360" r="45" fill="none" stroke="#93ddff" stroke-width="14" opacity="0.70"/>
        <circle cx="360" cy="360" r="12" fill="#93ddff"/>
      </svg>
      <span class="header__title">TextWatcher</span>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="btn--feedback" id="feedbackBtn" type="button" title="Send feedback">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 😍 heart eyes -->
          <g class="face-expr face-expr--1">
            <path d="M6.5,6 C6.25,4.5 4.5,4.5 4.5,6 C4.5,7.5 6.5,9 6.5,9 C6.5,9 8.5,7.5 8.5,6 C8.5,4.5 6.75,4.5 6.5,6Z" fill="currentColor"/>
            <path d="M13.5,6 C13.25,4.5 11.5,4.5 11.5,6 C11.5,7.5 13.5,9 13.5,9 C13.5,9 15.5,7.5 15.5,6 C15.5,4.5 13.75,4.5 13.5,6Z" fill="currentColor"/>
            <path d="M4 13.5 Q10 19 16 13.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          </g>
          <!-- 😀 big grin -->
          <g class="face-expr face-expr--2">
            <circle cx="6.5" cy="8" r="2.2" fill="currentColor"/>
            <circle cx="13.5" cy="8" r="2.2" fill="currentColor"/>
            <path d="M3 13 Q10 19.5 17 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          </g>
          <!-- 🤔 thinking — raised brow, tilted mouth -->
          <g class="face-expr face-expr--3">
            <path d="M3.5,5.5 Q6.5,3 9,5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            <path d="M11,5.5 L16,6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="6.5" cy="9" r="1.9" fill="currentColor"/>
            <circle cx="13.5" cy="9" r="1.9" fill="currentColor"/>
            <path d="M5.5,14.5 Q9,16 14,13.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" fill="none"/>
          </g>
          <!-- 😐 neutral -->
          <g class="face-expr face-expr--4">
            <circle cx="6.5" cy="8" r="2.2" fill="currentColor"/>
            <circle cx="13.5" cy="8" r="2.2" fill="currentColor"/>
            <path d="M5 14 L15 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </g>
          <!-- 😉 wink -->
          <g class="face-expr face-expr--5">
            <circle cx="6.5" cy="8" r="2.2" fill="currentColor"/>
            <path d="M11,7 Q13.5,11 16,7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
            <path d="M4 13.5 Q10 19 16 13.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          </g>
        </svg>
      </button>
      <button class="btn--help" id="tourBtn" type="button" title="Show tour">?</button>
      <label class="toggle" title="Enable / Disable monitoring" aria-label="Enable or disable monitoring">
        <input type="checkbox" id="masterToggle" />
        <span class="toggle__track"></span>
      </label>
    </div>
  </header>

  <!-- ── Tab Context Bar ───────────────────────────────────────── -->
  <div class="tab-ctx-bar" id="tabCtxBar" aria-live="polite" style="display:none;">
    <span class="tab-ctx-bar__dot" id="tabCtxDot"></span>
    <span class="tab-ctx-bar__text" id="tabCtxText"></span>
    <button class="tab-ctx-bar__cta hidden" id="tabCtxAddBtn">+ Add URL</button>
  </div>

  <!-- ── Add Rule ───────────────────────────────────────────── -->
  <section class="section" id="addRuleSection">

    <!-- Mode switcher — Table Mode first (default) -->
    <div class="mode-tabs" role="tablist" aria-label="Rule type">
      <button class="mode-tab active" id="modeRowBtn"  role="tab" aria-selected="true">
        Table Mode
        <span class="mode-tab__sub">Track a row in a table</span>
      </button>
      <button class="mode-tab"        id="modeTextBtn" role="tab" aria-selected="false">
        Text Mode
        <span class="mode-tab__sub">Any keyword on the page</span>
      </button>
    </div>

    <!-- Rule card wraps all mode-specific + shared inputs -->
    <div class="rule-card">

      <!-- ── MODE A: Text Mode ─────────────────────────── -->
      <div id="textModePanel" style="display:none">
        <div class="text-input-wrap" id="textInputWrap" data-detect-state="ok">
          <div class="input-row" style="gap:5px;">
            <div class="input-wrap" style="flex:1;" id="quickKeywordWrap">
              <input
                type="text"
                id="quickKeyword"
                class="input"
                placeholder="Keyword or phrase…"
                maxlength="500"
              />
              <button class="input-clear" type="button" aria-label="Clear" tabindex="-1">&times;</button>
            </div>
            <div class="modifier-btns" role="group" aria-label="Match modifiers">
              <button class="modifier-btn" id="modCaseBtn"  data-mod="case"  type="button" title="Case sensitive">Aa</button>
              <button class="modifier-btn" id="modExactBtn" data-mod="exact" type="button" title="Exact phrase">ab</button>
              <button class="modifier-btn" id="modRegexBtn" data-mod="regex" type="button" title="Regular expression">.*</button>
            </div>
          </div>
          <div class="col-detect-overlay" id="textDetectOverlay">
            <span id="textDetectMsg"></span>
          </div>
        </div>
        <p class="match-hint" id="matchHint">Matches text anywhere on the page, any case</p>
        <p class="match-preview" id="textMatchPreview" aria-live="polite" style="display:none"></p>
        <div class="match-samples" id="textMatchSamples"></div>
      </div>

      <!-- ── MODE B: Table Mode ─────────────────────── -->
      <div id="rowModePanel">
        <div class="col-filter-wrap" id="colFilterWrap" data-detect-state="detecting">
          <div class="col-filter-grid" id="colFilterList">
            <!-- Rendered dynamically by renderColFilters() -->
          </div>
          <button class="btn btn--ghost btn--sm btn--add-col" id="addColBtn" type="button" disabled>
            + Add column
          </button>
          <div class="col-detect-overlay" id="colDetectOverlay">
            <span id="colDetectMsg"></span>
          </div>
        </div>
      </div>

      <!-- ── Shared: alert name ─────────────────────────────── -->
      <div class="input-wrap" style="margin-top:10px;">
        <input
          type="text"
          id="alertName"
          class="input"
          placeholder="Notification title (optional)"
          maxlength="100"
        />
        <button class="input-clear" type="button" aria-label="Clear" tabindex="-1">&times;</button>
      </div>

      <!-- ── Shared: alert checkboxes ───────────────────────── -->
      <div class="checkbox-row" style="margin-top:8px;">
        <label class="checkbox-label">
          <input type="checkbox" id="quickAlertAppear" checked />
          Alert when appears
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="quickAlertDisappear" checked />
          Alert when disappears
        </label>
      </div>

      <!-- ── Shared: URL binding ────────────────────────────── -->
      <div id="urlBindingBar" class="url-binding-bar"></div>

      <!-- ── Shared: live match preview (row mode only) ──────── -->
      <p class="match-preview" id="matchPreview" aria-live="polite" style="display:none"></p>
      <div class="match-samples" id="matchSamples"></div>

    </div><!-- /.rule-card -->

    <!-- ── Submit ────────────────────────────────────────────── -->
    <button class="btn btn--primary" id="addKeywordBtn" style="margin-top:8px;">Save Rule</button>
    <p class="error-msg hidden" id="keywordError" role="alert"></p>

  </section>

  <!-- ── Quick Add URL ──────────────────────────────────────── -->
  <section class="section">
    <h2 class="section__title">Quick Add URL</h2>
    <div class="rule-card">
      <div class="input-row">
        <div class="input-wrap" style="flex:1;">
          <input
            type="text"
            id="quickUrl"
            class="input"
            placeholder="https://example.com/*"
            maxlength="500"
          />
          <button class="input-clear" type="button" aria-label="Clear" tabindex="-1">&times;</button>
        </div>
        <!-- URL match type: modifier-style button group -->
        <div class="modifier-btns url-match-btns" role="group" aria-label="URL match type">
          <button class="modifier-btn active" data-match="wildcard" type="button" title="Wildcard — use * as wildcard">Wild</button>
          <button class="modifier-btn"        data-match="exact"    type="button" title="Exact URL match">Exact</button>
          <button class="modifier-btn"        data-match="domain"   type="button" title="Match entire domain">Domain</button>
        </div>
      </div>
      <p class="url-match-hint" id="urlMatchHint">Use * as wildcard — e.g. https://example.com/*</p>
      <div class="input-wrap" style="margin-top: 6px;">
        <input
          type="text"
          id="quickUrlLabel"
          class="input"
          placeholder="Label (optional)"
          maxlength="100"
        />
        <button class="input-clear" type="button" aria-label="Clear" tabindex="-1">&times;</button>
      </div>
      <div class="input-row" style="margin-top:6px;">
        <button class="btn btn--ghost" id="useCurrentUrlBtn" style="width:100%; font-size:12px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> Use Current Tab's URL</button>
      </div>
    </div>
    <button class="btn btn--primary" id="addUrlBtn" style="margin-top: 8px;">Add URL</button>
    <p class="error-msg hidden" id="urlError" role="alert"></p>
  </section>

  <!-- ── Active Rules Summary ───────────────────────────────── -->
  <section class="section">
    <h2 class="section__title">Active Rules</h2>
    <div class="summary-grid">
      <button class="summary-card" id="cardKeywords" title="Open Keywords in Full Settings">
        <span class="summary-card__count" id="keywordCount">0</span>
        <span class="summary-card__label">Keywords</span>
      </button>
      <button class="summary-card" id="cardUrls" title="Open URLs in Full Settings">
        <span class="summary-card__count" id="urlCount">0</span>
        <span class="summary-card__label">URLs</span>
      </button>
      <button class="summary-card" id="cardAlerts" title="Open Activity in Full Settings">
        <span class="summary-card__count" id="alertCount">0</span>
        <span class="summary-card__label">Alerts</span>
      </button>
    </div>
  </section>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <footer class="footer">
    <button class="btn btn--ghost" id="navSetups">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2z"/><path d="M7 7h.01"/></svg>
      Rule History
    </button>
    <button class="btn btn--ghost" id="openOptionsBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Settings</button>
  </footer>

  <!-- ── Toast ──────────────────────────────────────────────── -->
  <div class="toast hidden" id="popupToast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- ── Tour overlay ────────────────────────────────────────── -->
  <div class="tour-overlay hidden" id="tourOverlay" aria-modal="true" role="dialog">
    <div class="tour-spotlight" id="tourSpotlight"></div>
    <div class="tour-tooltip" id="tourTooltip">
      <p class="tour-tooltip__step" id="tourStepLabel"></p>
      <p class="tour-tooltip__text" id="tourText"></p>
      <div class="tour-tooltip__actions">
        <button class="tour-btn tour-btn--skip" id="tourSkipBtn" type="button">Skip</button>
        <div class="tour-tooltip__nav">
          <button class="tour-btn tour-btn--back" id="tourBackBtn" type="button" disabled>← Back</button>
          <button class="tour-btn tour-btn--next" id="tourNextBtn" type="button">Next →</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
