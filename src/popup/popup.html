<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TextWatcher</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="header__brand">
      <img src="../icons/icon48.png" alt="TextWatcher" class="header__logo" />
      <span class="header__title">TextWatcher</span>
    </div>
    <label class="toggle" title="Enable / Disable monitoring">
      <input type="checkbox" id="masterToggle" />
      <span class="toggle__track"></span>
    </label>
  </header>

  <!-- ── Status Bar ─────────────────────────────────────────── -->
  <div class="status-bar" id="statusBar">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">Loading…</span>
  </div>

  <!-- ── Live Match Status ──────────────────────────────────── -->
  <section class="section hidden" id="liveSection">
    <h2 class="section__title">Live — This Tab</h2>
    <ul class="match-list" id="matchList"></ul>
  </section>

  <!-- ── Quick Add Keyword ──────────────────────────────────── -->
  <section class="section">
    <h2 class="section__title">Quick Add Keyword</h2>
    <div class="input-row">
      <input
        type="text"
        id="quickKeyword"
        class="input"
        placeholder="Keyword or phrase…"
        maxlength="500"
      />
      <select id="quickMatchType" class="select select--compact">
        <option value="contains">Contains</option>
        <option value="exact_nocase">Exact (any case)</option>
        <option value="exact_case">Exact (case-sensitive)</option>
        <option value="starts_with">Starts with</option>
        <option value="ends_with">Ends with</option>
        <option value="regex">Regex</option>
      </select>
    </div>
    <div class="checkbox-row">
      <label class="checkbox-label">
        <input type="checkbox" id="quickAlertAppear" checked />
        Alert when appears
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="quickAlertDisappear" checked />
        Alert when disappears
      </label>
    </div>
    <button class="btn btn--link" id="advancedToggleBtn" type="button"><svg id="advChevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg> Advanced</button>
    <div id="advancedRow" class="advanced-row hidden">
      <input
        type="text"
        id="quickScope"
        class="input"
        placeholder="Scope: CSS selector (e.g. #results)"
        maxlength="500"
      />
      <p class="advanced-hint">Leave empty to scan the whole page.</p>
    </div>
    <button class="btn btn--primary" id="addKeywordBtn">Add Keyword</button>
    <p class="error-msg hidden" id="keywordError"></p>
  </section>

  <!-- ── Quick Add URL ──────────────────────────────────────── -->
  <section class="section">
    <h2 class="section__title">Quick Add URL</h2>
    <div class="input-row">
      <input
        type="text"
        id="quickUrl"
        class="input"
        placeholder="https://example.com/*"
        maxlength="500"
      />
      <select id="quickUrlMatchType" class="select select--compact">
        <option value="wildcard">Wildcard</option>
        <option value="exact">Exact URL</option>
        <option value="domain">Domain-wide</option>
      </select>
    </div>
    <input
      type="text"
      id="quickUrlLabel"
      class="input"
      placeholder="Label (optional)"
      maxlength="100"
      style="margin-top: 6px;"
    />
    <button class="btn btn--primary" id="addUrlBtn" style="margin-top: 8px;">Add URL</button>
    <p class="error-msg hidden" id="urlError"></p>
  </section>

  <!-- ── Active Rules Summary ───────────────────────────────── -->
  <section class="section">
    <h2 class="section__title">Active Rules</h2>
    <div class="summary-grid">
      <div class="summary-card">
        <span class="summary-card__count" id="keywordCount">0</span>
        <span class="summary-card__label">Keywords</span>
      </div>
      <div class="summary-card">
        <span class="summary-card__count" id="urlCount">0</span>
        <span class="summary-card__label">URLs</span>
      </div>
      <div class="summary-card">
        <span class="summary-card__count" id="historyCount">0</span>
        <span class="summary-card__label">History</span>
      </div>
    </div>
  </section>

  <!-- ── Recent History ─────────────────────────────────────── -->
  <section class="section" id="historySection">
    <h2 class="section__title">
      Recent Setups
      <span class="section__badge" id="historyBadge">0</span>
    </h2>
    <ul class="history-list" id="historyList">
      <li class="history-list__empty">No saved setups yet.</li>
    </ul>
  </section>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <footer class="footer">
    <button class="btn btn--ghost" id="openOptionsBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Full Settings</button>
    <button class="btn btn--ghost" id="saveSnapshotBtn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save Setup</button>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
